services:
  db:
    image: mysql:8.0
    container_name: wordpress_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password_here
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress_user
      MYSQL_PASSWORD: secure_password_here
    volumes:
      - db_data:/var/lib/mysql

  wordpress:
    depends_on:
      - db
    image: wordpress:7.0.0-php8.2-apache
    container_name: wordpress_app
    restart: unless-stopped
    ports:
      - "9090:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wordpress_user
      WORDPRESS_DB_PASSWORD: secure_password_here
      WORDPRESS_DB_NAME: wordpress
    volumes:
      - wp_data:/var/www/html
      # Add this new line to mount your custom PHP settings
      - ./uploads.ini:/usr/local/etc/php/conf.d/uploads.ini
      # Mount the local uploads directory
      - ./uploads:/var/www/html/wp-content/uploads
      # Map local themes directory
      - ./wp-content/themes:/var/www/html/wp-content/themes
      # Map local plugins directory
      - ./wp-content/plugins:/var/www/html/wp-content/plugins

volumes:
  db_data:
  wp_data: